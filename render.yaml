services:
  - type: web
    name: labio-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --run-syncdb"
    startCommand: "gunicorn labio.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: your-app-name.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: labio-db
          property: connectionString

databases:
  - name: labio-db
    databaseName: labio_db_95ie
    user: labio_db_95ie_user